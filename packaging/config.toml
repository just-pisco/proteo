# Proteo configuration — /etc/proteo/config.toml
# Per-user overrides go in ~/.config/proteo/config.toml (same keys, they win).
# Every key is optional; the values shown are the built-in defaults.

# Physical output that `proteo rescue` re-enables when no session snapshot
# exists, and the mode to force it to ("" = keep whatever mode it has).
#rescue_output = "DP-2"
#rescue_mode = ""            # e.g. "5120x1440@240"

# What happens to physical outputs while a stream session is active:
# "disable" = physical screens go dark, the virtual display is the only one
# "keep"    = desktop extends onto the virtual display
#physical_during_stream = "disable"

# Clamps applied to client-requested modes. Widths/heights beyond 4095 are
# not encodable in an EDID detailed timing descriptor.
#max_width = 4095
#max_height = 2304
#min_width = 640
#min_height = 480
#default_width = 1920
#default_height = 1080
#default_fps = 60
#max_fps = 240
#min_fps = 24

# HDR on the virtual display — currently IMPOSSIBLE on the evdi kernel module:
# its DRM connector lacks the Colorspace and HDR_OUTPUT_METADATA properties, so
# KWin never offers HDR on the virtual output (verified 2026-07-06, evdi 1.14.15;
# see AGENTS.md "Phase 4"). The flag is reserved for a future evdi that supports
# them; until then it has no effect beyond being ANDed with the client request.
#hdr_enabled = false

# Monitor name embedded in the virtual display's EDID.
#virtual_name = "Proteo VD"

# systemd user unit of the streaming host that proteo-guard watches.
#host_unit = "app-dev.lizardbyte.app.Sunshine.service"
#guard_poll_seconds = 1
#guard_debounce = 2
